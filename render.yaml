# Render.com deployment config (free tier)
# https://render.com/docs
services:
  - type: web
    name: debate-mind-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_BASE
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: VISION_MODEL
        value: gpt-4o
      - key: MAX_DEBATE_ROUNDS
        value: "2"
